<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanças Pessoais</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="app">
      <!-- Cabeçalho -->
      <header class="app-header">
        <h1 class="app-title">Finanças Pessoais</h1>
        <p class="app-description">
          Pequeno sistema para controle de finanças pessoais
        </p>
      </header>

      <!-- Seção do saldo -->
      <section class="balance-section">
        <h2 class="balance-label">Saldo total</h2>
        <p class="balance-value" id="balance">R$ 0,00</p>
      </section>

      <!-- Seção do formulário -->
      <section class="form-section">
        <h2>Nova transação</h2>

        <form id="transaction-form" class="transaction-form">
          <div class="form-group">
            <label for="transaction-name" class="form-label">
              Nome da transação
            </label>
            <input
              type="text"
              id="transaction-name"
              class="form-input"
              placeholder="Ex: Salário, Mercado, Aluguel"
              required
            />
          </div>

          <div class="form-group">
            <label for="transaction-amount" class="form-label"> Valor </label>
            <input
              type="number"
              id="transaction-amount"
              class="form-input"
              placeholder="Ex: 500 ou -120"
              step="0.01"
              required
            />
          </div>

          <button type="submit" class="form-button">Adicionar transação</button>
        </form>
      </section>

      <!-- Seção das transações -->
      <section class="transactions-section">
        <h2>Transações</h2>

        <table class="transactions-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Valor</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="transactions-body">
            <!-- As transações serão inseridas aqui pelo JavaScript -->
          </tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
